name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libffi-dev libssl-dev \
            libltdl-dev libgdbm-dev liblzma-dev \
            libncurses5-dev libsqlite3-dev \
            ccache git unzip \
            lib32z1 lib32stdc++6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Export Android env for Buildozer
        run: |
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "${ANDROID_SDK_ROOT}/build-tools/35.0.0" >> $GITHUB_PATH
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> $GITHUB_PATH

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('apk_app/buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Install Buildozer and Cython
        run: pip install --upgrade buildozer cython

      - name: Build debug APK
        working-directory: apk_app
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo "--- Build finished ---"
          ls -lh bin/*.apk 2>/dev/null || (echo "APK not found — check build.log"; exit 1)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BarcodOmatic-debug-apk
          path: apk_app/bin/*.apk
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: apk_app/build.log
          retention-days: 7
