name: Pack and Publish NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/Barcod0Matic/Barcod0Matic.csproj

      - name: Build
        run: dotnet build src/Barcod0Matic/Barcod0Matic.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/Barcod0Matic/Barcod0Matic.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
          retention-days: 30

      - name: Select package to publish
        id: package
        run: |
          PACKAGE_FILE="$(find ./artifacts -maxdepth 1 -type f -name 'Barcod0Matic.*.nupkg' ! -name '*.snupkg' | head -n1)"
          if [ -z "$PACKAGE_FILE" ]; then
            echo "No package found to publish."
            exit 1
          fi
          echo "path=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "${{ steps.package.outputs.path }}" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
