name: Pack and Publish NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/Barcod0Matic/Barcod0Matic.csproj

      - name: Build
        run: dotnet build src/Barcod0Matic/Barcod0Matic.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/Barcod0Matic/Barcod0Matic.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg
          retention-days: 30

      - name: Publish to NuGet.org
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
